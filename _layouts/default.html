<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Source+Sans+3&display=swap" rel="stylesheet">

  <!-- MathJax -->
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>

  <style>
    body {
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;

      font-family: 'Georgia', sans-serif;
      font-size: 18px;
      line-height: 1.7;
      color: #222;
      background: #ffffff;
    }

    /* Navigation */
    nav {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      margin-bottom: 30px;
    }

    nav a {
      text-decoration: none;
      color: #333;
      margin-right: 15px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Headings */
    h1, h2, h3 {
      font-family: 'Source Sans 3', sans-serif;
      margin-top: 30px;
    }

    h1 {
      font-size: 32px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    h2 {
      font-size: 24px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 3px;
    }

    /* Links */
    a {
      color: #1a73e8;
    }

    /* Lists */
    ul {
      padding-left: 20px;
    }

    /* Subtle separation */
    hr {
      margin: 30px 0;
      border: none;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/publications">Publications</a>
  <a href="/teaching">Teaching</a>
  <a href="/projects">Projects</a>
  <a href="/cv">CV</a>
</nav>

{{ content }}

</body>
</html>
